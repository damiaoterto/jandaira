services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - jandaira

  api:
    build:
      context: .
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
    ports:
      - "8080:8080"
    networks:
      - jandaira

networks:
  jandaira:
    driver: bridge

volumes:
  qdrant_storage:
