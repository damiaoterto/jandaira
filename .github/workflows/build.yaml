name: Docker Build and Push (with cache)

on:
  release:
    types: [published]
  pull_request: null

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: "Build and push docker image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download front-end
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release download -p "*.tgz" -R damiaoterto/jandaira-frontend

          echo "Download da última versão concluído!"
          ls -la *.tgz # Lista os arquivos para você conferir no log da Action

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-setups:
    name: "Build ${{ matrix.goos }} setup"
    runs-on: ${{ matrix.os }}
    needs: build-and-push
    permissions:
      contents: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            ext: ""
          - os: macos-latest
            goos: darwin
            ext: ""
          - os: windows-latest
            goos: windows
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download and extract front-end
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release download -p "*.tgz" -R damiaoterto/jandaira-frontend
          mkdir -p _frontend
          tar -xzf *.tgz -C _frontend
          # tgz extracts to _frontend/dist/ — that directory IS the site root

      - name: Build binaries in parallel
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64
        run: |
          mkdir -p dist/dist
          if [ "${{ matrix.goos }}" = "linux" ]; then
            CGO_ENABLED=1 go build -ldflags="-w -s -extldflags '-static'" -trimpath -o dist/jandaira-api ./cmd/api/main.go &
            CGO_ENABLED=0 go build -ldflags="-w -s" -trimpath -o dist/jandaira-static ./cmd/static/main.go &
          else
            CGO_ENABLED=0 go build -ldflags="-w -s" -trimpath -o "dist/jandaira-api${{ matrix.ext }}" ./cmd/api/main.go &
            CGO_ENABLED=0 go build -ldflags="-w -s" -trimpath -o "dist/jandaira-static${{ matrix.ext }}" ./cmd/static/main.go &
          fi
          wait
          cp -r _frontend/dist/. dist/dist/

      # ── Shared: background control script (Linux + macOS) ────────────────
      - name: Create background control script
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          cat > dist/jandaira.sh << 'CTRL'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          PID_DIR="$HOME/.jandaira"
          mkdir -p "$PID_DIR"

          start() {
            if [ -f "$PID_DIR/api.pid" ] && kill -0 "$(cat "$PID_DIR/api.pid")" 2>/dev/null; then
              echo "Already running"; return 1
            fi
            "$SCRIPT_DIR/jandaira-api"    > "$PID_DIR/api.log"    2>&1 &; echo $! > "$PID_DIR/api.pid"
            "$SCRIPT_DIR/jandaira-static" > "$PID_DIR/static.log" 2>&1 &; echo $! > "$PID_DIR/static.pid"
            echo "Started — api($(cat "$PID_DIR/api.pid")) static($(cat "$PID_DIR/static.pid"))"
          }

          stop() {
            for svc in api static; do
              f="$PID_DIR/$svc.pid"
              if [ -f "$f" ]; then kill "$(cat "$f")" 2>/dev/null || true; rm -f "$f"; fi
            done
            echo "Stopped"
          }

          status() {
            for svc in api static; do
              f="$PID_DIR/$svc.pid"
              if [ -f "$f" ] && kill -0 "$(cat "$f")" 2>/dev/null; then
                echo "$svc: running (PID $(cat "$f"))"
              else
                echo "$svc: stopped"
              fi
            done
          }

          case "$1" in
            start)   start  ;;
            stop)    stop   ;;
            restart) stop; start ;;
            status)  status ;;
            *) echo "Usage: $0 {start|stop|restart|status}"; exit 1 ;;
          esac
          CTRL

          chmod +x dist/jandaira.sh

      # ── Linux: universal install.sh (detects OS, downloads + installs) ───
      - name: Create universal install script
        if: matrix.goos == 'linux'
        run: |
          cat > install.sh << 'INSTALLER'
          #!/bin/bash
          set -euo pipefail

          if [ "$(id -u)" -ne 0 ]; then
            exec sudo "$0" "$@"
          fi

          REPO="damiaoterto/jandaira"
          ARCH="amd64"

          OS="$(uname -s)"
          case "$OS" in
            Linux)  GOOS="linux";  INSTALL_DIR="/opt/jandaira" ;;
            Darwin) GOOS="darwin"; INSTALL_DIR="/usr/local/jandaira" ;;
            *) echo "Unsupported OS: $OS" >&2; exit 1 ;;
          esac

          VERSION="$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" \
            | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')"
          [ -z "$VERSION" ] && { echo "Failed to resolve latest version" >&2; exit 1; }

          ZIP_URL="https://github.com/${REPO}/releases/download/${VERSION}/jandaira-${GOOS}-${ARCH}.zip"
          echo "Installing Jandaira ${VERSION} (${GOOS}/${ARCH})..."

          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT

          curl -fsSL "$ZIP_URL" -o "$TMP/jandaira.zip"
          unzip -q "$TMP/jandaira.zip" -d "$TMP/pkg"

          mkdir -p "$INSTALL_DIR/dist"
          cp "$TMP/pkg/jandaira-api"    "$INSTALL_DIR/"
          cp "$TMP/pkg/jandaira-static" "$INSTALL_DIR/"
          cp -r "$TMP/pkg/dist/."       "$INSTALL_DIR/dist/"
          chmod +x "$INSTALL_DIR/jandaira-api" "$INSTALL_DIR/jandaira-static"

          if [ "$GOOS" = "linux" ]; then
            cat > /etc/systemd/system/jandaira-api.service << 'EOF'
          [Unit]
          Description=Jandaira API
          After=network.target

          [Service]
          Type=simple
          ExecStart=/opt/jandaira/jandaira-api
          WorkingDirectory=/opt/jandaira
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

            cat > /etc/systemd/system/jandaira-static.service << 'EOF'
          [Unit]
          Description=Jandaira Static Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/opt/jandaira/jandaira-static
          WorkingDirectory=/opt/jandaira
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

            systemctl daemon-reload
            systemctl enable jandaira-api jandaira-static
            systemctl start jandaira-api jandaira-static

          elif [ "$GOOS" = "darwin" ]; then
            PLIST_DIR="/Library/LaunchDaemons"

            cat > "$PLIST_DIR/io.jandaira.api.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>Label</key><string>io.jandaira.api</string>
              <key>ProgramArguments</key><array><string>/usr/local/jandaira/jandaira-api</string></array>
              <key>RunAtLoad</key><true/><key>KeepAlive</key><true/>
              <key>WorkingDirectory</key><string>/usr/local/jandaira</string>
              <key>StandardOutPath</key><string>/var/log/jandaira-api.log</string>
              <key>StandardErrorPath</key><string>/var/log/jandaira-api.err</string>
          </dict></plist>
          EOF

            cat > "$PLIST_DIR/io.jandaira.static.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>Label</key><string>io.jandaira.static</string>
              <key>ProgramArguments</key><array><string>/usr/local/jandaira/jandaira-static</string></array>
              <key>RunAtLoad</key><true/><key>KeepAlive</key><true/>
              <key>WorkingDirectory</key><string>/usr/local/jandaira</string>
              <key>StandardOutPath</key><string>/var/log/jandaira-static.log</string>
              <key>StandardErrorPath</key><string>/var/log/jandaira-static.err</string>
          </dict></plist>
          EOF

            launchctl load -w "$PLIST_DIR/io.jandaira.api.plist"
            launchctl load -w "$PLIST_DIR/io.jandaira.static.plist"
            launchctl start io.jandaira.api
            launchctl start io.jandaira.static
          fi

          echo "Jandaira ${VERSION} installed successfully!"
          INSTALLER

          chmod +x install.sh

      # ── Windows ───────────────────────────────────────────────────────────
      - name: Create Windows installer
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          @'
          # Jandaira Windows Installer — Run as Administrator
          #Requires -RunAsAdministrator
          $ErrorActionPreference = "Stop"

          $ScriptDir  = Split-Path -Parent $MyInvocation.MyCommand.Path
          $InstallDir = "C:\Program Files\Jandaira"

          New-Item -ItemType Directory -Force -Path "$InstallDir\dist" | Out-Null
          Copy-Item "$ScriptDir\jandaira-api.exe"    "$InstallDir\"
          Copy-Item "$ScriptDir\jandaira-static.exe" "$InstallDir\"
          Copy-Item -Recurse "$ScriptDir\dist\*"     "$InstallDir\dist\"

          # NSSM wraps plain Go binaries as proper Windows services
          $nssmZip = "$env:TEMP\nssm.zip"
          Invoke-WebRequest "https://nssm.cc/release/nssm-2.24.zip" -OutFile $nssmZip
          Expand-Archive $nssmZip -DestinationPath "$env:TEMP\nssm" -Force
          Copy-Item "$env:TEMP\nssm\nssm-2.24\win64\nssm.exe" "$InstallDir\"
          $nssm = "$InstallDir\nssm.exe"

          & $nssm install JandairaAPI    "$InstallDir\jandaira-api.exe"
          & $nssm set     JandairaAPI    AppDirectory "$InstallDir"
          & $nssm set     JandairaAPI    DisplayName  "Jandaira API"
          & $nssm set     JandairaAPI    Start        SERVICE_AUTO_START

          & $nssm install JandairaStatic "$InstallDir\jandaira-static.exe"
          & $nssm set     JandairaStatic AppDirectory "$InstallDir"
          & $nssm set     JandairaStatic DisplayName  "Jandaira Static Server"
          & $nssm set     JandairaStatic Start        SERVICE_AUTO_START

          Start-Service JandairaAPI, JandairaStatic
          Write-Host "Installed! API and static server running as Windows services."
          '@ | Out-File -FilePath dist\install.ps1 -Encoding utf8

      - name: Export install script as release asset
        if: matrix.goos == 'windows'
        shell: bash
        run: cp dist/install.ps1 install-windows.ps1

      # ── Packaging ─────────────────────────────────────────────────────────
      - name: Package Linux zip
        if: matrix.goos == 'linux'
        run: cd dist && zip -r ../jandaira-linux-amd64.zip . && cd ..

      - name: Package Linux deb
        if: matrix.goos == 'linux'
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.1"
          fi
          DEB_ROOT="pkg-deb"

          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/opt/jandaira/dist"
          mkdir -p "$DEB_ROOT/lib/systemd/system"

          cp dist/jandaira-api    "$DEB_ROOT/opt/jandaira/"
          cp dist/jandaira-static "$DEB_ROOT/opt/jandaira/"
          chmod +x "$DEB_ROOT/opt/jandaira/jandaira-api" "$DEB_ROOT/opt/jandaira/jandaira-static"
          cp -r dist/dist/. "$DEB_ROOT/opt/jandaira/dist/"

          cat > "$DEB_ROOT/lib/systemd/system/jandaira-api.service" << 'SVC'
          [Unit]
          Description=Jandaira API
          After=network.target

          [Service]
          Type=simple
          ExecStart=/opt/jandaira/jandaira-api
          WorkingDirectory=/opt/jandaira
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SVC

          cat > "$DEB_ROOT/lib/systemd/system/jandaira-static.service" << 'SVC'
          [Unit]
          Description=Jandaira Static Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/opt/jandaira/jandaira-static
          WorkingDirectory=/opt/jandaira
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SVC

          cat > "$DEB_ROOT/DEBIAN/control" << EOF
          Package: jandaira
          Version: $VERSION
          Section: web
          Priority: optional
          Architecture: amd64
          Maintainer: Jandaira <francisco.damiao.dev@gmail.com>
          Description: Jandaira API and static server
           Full distribution with API, static server, and frontend.
          EOF

          cat > "$DEB_ROOT/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          set -e
          systemctl daemon-reload
          systemctl enable --now jandaira-api jandaira-static
          EOF
          chmod 755 "$DEB_ROOT/DEBIAN/postinst"

          cat > "$DEB_ROOT/DEBIAN/prerm" << 'EOF'
          #!/bin/bash
          set -e
          systemctl disable --now jandaira-api jandaira-static || true
          EOF
          chmod 755 "$DEB_ROOT/DEBIAN/prerm"

          dpkg-deb --build "$DEB_ROOT" "jandaira_${VERSION}_amd64.deb"

      - name: Package macOS zip
        if: matrix.goos == 'darwin'
        run: cd dist && zip -r ../jandaira-darwin-amd64.zip . && cd ..

      - name: Package Windows zip
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath jandaira-windows-amd64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jandaira-${{ matrix.goos }}-amd64
          if-no-files-found: ignore
          path: |
            jandaira-*.zip
            jandaira-*.deb
            install.sh
            install-windows.ps1

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jandaira-*.zip
            jandaira-*.deb
            install.sh
            install-windows.ps1
